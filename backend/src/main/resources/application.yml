server:
  port: ${BACKEND_PORT:8082}

spring:
  application:
    name: wuxiaozhi-backend
  config:
    import: optional:file:../config/dify.env
  datasource:
    url: jdbc:h2:file:./data/wuxiaozhi;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

wuxiaozhi:
  jwt:
    secret: change-this-jwt-secret-in-production-wuxiaozhi-2026
    expiration-ms: 86400000
  upload:
    dir: ./uploads
  experiments:
    config-dir: classpath:experiments/
  dify:
    base-url: ${DIFY_BASE_URL:}
    api-key: ${DIFY_API_KEY:}
    app-mode: ${DIFY_APP_MODE:chat}
    workflows:
      vision-correction: ${DIFY_WF_VISION_CORRECTION:}
      text-assist: ${DIFY_WF_TEXT_ASSIST:}
      env-check: ${DIFY_WF_ENV_CHECK:}
      report-generate: ${DIFY_WF_REPORT_GENERATE:}
    knowledge:
      top-k: ${DIFY_KB_TOP_K:5}
      api-key: ${DIFY_KB_API_KEY:}
  # Dify 全部配置见项目根目录 config/dify.env（由 spring.config.import 加载）

logging:
  level:
    com.wuxiaozhi: INFO
