        teachingSection: "newton_rings.step.2.teaching"
        rulesSection: "newton_rings.step.2.rules"
        retrievalTags:
          - "newton_rings"
          - "step:2"
          - "环心定位"
          - "视觉纠错"
      "3":
        title: "暗环直径测量"
        correctionMode: "data"
        guide: "newton_rings/steps/3.md"
        teachingSection: "newton_rings.step.3.teaching"
        rulesSection: "newton_rings.step.3.rules"
        retrievalTags:
          - "newton_rings"
          - "step:3"
          - "暗环直径"
          - "读数"
          - "数据纠错"
      "4":
        title: "曲率半径或波长计算"
        correctionMode: "data"
        guide: "newton_rings/steps/4.md"
        teachingSection: "newton_rings.step.4.teaching"
