    - data:
        code: "import json\nimport re\n\n\ndef _strip_code_fence(text):\n    text = (text or \"\").strip()\n    text = re.sub(r\"\
          ^```(?:json)?\\s*\", \"\", text, flags=re.I)\n    text = re.sub(r\"\\s*```$\", \"\", text)\n    return text.strip()\n\
          \n\ndef _extract_json(text):\n    text = _strip_code_fence(text)\n    if not text:\n        return None\n    try:\n\
          \        return json.loads(text)\n    except Exception:\n        pass\n    start = text.find(\"{\")\n    end = text.rfind(\"\
          }\")\n    if start >= 0 and end > start:\n        try:\n            return json.loads(text[start:end + 1])\n   \
          \     except Exception:\n            return None\n    return None\n\n\ndef _norm_region(region):\n    def clamp(v):\n\
          \        try:\n            v = int(round(float(v)))\n        except Exception:\n            v = 0\n        return\
          \ max(0, min(1000, v))\n    return {\n        \"topLeftX\": clamp(region.get(\"topLeftX\")),\n        \"topLeftY\"\
          : clamp(region.get(\"topLeftY\")),\n        \"bottomRightX\": clamp(region.get(\"bottomRightX\")),\n        \"bottomRightY\"\
          : clamp(region.get(\"bottomRightY\")),\n        \"label\": str(region.get(\"label\") or \"问题区域\")[:60],\n    }\n\
          \n\ndef main(raw_text=\"\", experiment_type=\"\", experiment_code=\"\", step_id=\"\", step_title=\"\"):\n    parsed\
          \ = _extract_json(raw_text)\n    if not isinstance(parsed, dict):\n        parsed = {\n            \"experiment\"\
          : experiment_type or \"未知实验\",\n            \"experiment_code\": experiment_code or \"\",\n            \"step_id\"\
          : step_id or \"\",\n            \"step_title\": step_title or \"\",\n            \"is_step_related\": False,\n \
          \           \"summary\": \"模型输出无法解析为有效 JSON，建议重新上传清晰图片或重试。\",\n            \"issues\": [],\n            \"regions\"\
          : [],\n            \"next_action\": \"请重新检查输入图片、当前实验和步骤信息后再次分析。\",\n        }\n\n    parsed.setdefault(\"experiment\"\
          , experiment_type or \"未知实验\")\n    parsed.setdefault(\"experiment_code\", experiment_code or \"\")\n    parsed.setdefault(\"\
          step_id\", step_id or \"\")\n    parsed.setdefault(\"step_title\", step_title or \"\")\n    parsed.setdefault(\"\
          is_step_related\", True)\n    parsed.setdefault(\"summary\", \"\")\n    parsed.setdefault(\"issues\", [])\n    parsed.setdefault(\"\
          regions\", [])\n    parsed.setdefault(\"next_action\", \"\")\n\n    if not isinstance(parsed.get(\"issues\"), list):\n\
          \        parsed[\"issues\"] = []\n    if not isinstance(parsed.get(\"regions\"), list):\n        parsed[\"regions\"\
          ] = []\n\n    parsed[\"regions\"] = [_norm_region(r) for r in parsed[\"regions\"] if isinstance(r, dict)]\n    normalized_issues\
          \ = []\n    for issue in parsed[\"issues\"]:\n        if not isinstance(issue, dict):\n            continue\n  \
          \      severity = issue.get(\"severity\") if issue.get(\"severity\") in [\"高\", \"中\", \"低\"] else \"中\"\n     \
          \   try:\n            confidence = float(issue.get(\"confidence\", 0.5))\n        except Exception:\n          \
          \  confidence = 0.5\n        issue[\"severity\"] = severity\n        issue[\"confidence\"] = max(0, min(1, confidence))\n\
          \        normalized_issues.append(issue)\n    parsed[\"issues\"] = normalized_issues\n\n    return {\n        \"\
          vision_json\": json.dumps(parsed, ensure_ascii=False),\n        \"regions\": json.dumps(parsed.get(\"regions\",\
          \ []), ensure_ascii=False),\n        \"summary\": str(parsed.get(\"summary\", \"\")),\n        \"issues_count\"\
          : len(parsed.get(\"issues\", [])),\n    }\n"
