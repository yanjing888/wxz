        code: "def _clean(value):\n    if value is None:\n        return \"\"\n    return str(value).strip()\n\n\ndef main(query=\"\
          \", image_name=\"\", image_url=\"\", mime_type=\"\", experiment_code=\"\", experiment_type=\"\", category=\"\",\
          \ step_id=\"\", step_title=\"\", step_desc=\"\", correction_mode=\"\", data_json=\"\"):\n    query = _clean(query)\n\
          \    experiment_code = _clean(experiment_code) or \"newton_rings\"\n    experiment_type = _clean(experiment_type)\
          \ or \"牛顿环实验\"\n    category = (_clean(category) or \"auto\").lower()\n    correction_mode = (_clean(correction_mode)\
          \ or \"auto\").lower()\n    step_id = _clean(step_id)\n    step_title = _clean(step_title)\n    step_desc = _clean(step_desc)\n\
          \    data_json = _clean(data_json)\n\n    has_image = bool(_clean(image_name) or _clean(image_url))\n    has_data\
          \ = bool(data_json) or correction_mode == \"data\" or category == \"data\"\n\n    if has_data:\n        mode = \"\
          data\"\n    elif has_image or correction_mode == \"vision\" or category == \"vision\":\n        mode = \"vision\"\
          \n    else:\n        mode = \"text\"\n\n    if not query:\n        if mode == \"vision\":\n            query = \"\
          请根据当前实验和步骤，对上传图片进行视觉纠错。\"\n        elif mode == \"data\":\n            query = \"请根据当前实验和步骤，对实验数据进行纠错分析。\"\n   \
          \     else:\n            query = \"请结合实验教学知识库回答我的问题。\"\n\n    step_part = \" \".join([x for x in [step_id, step_title,\
          \ step_desc] if x])\n    retrieval_query_teaching = f\"{experiment_type} {experiment_code} {step_part} {query} 实验原理\
          \ 操作步骤 数据处理 注意事项\"\n    retrieval_query_rules = f\"{experiment_type} {experiment_code} {step_part} 视觉纠错 规则 常见错误\
          \ evidence fix_instruction\"\n\n    return {\n        \"mode\": mode,\n        \"query\": query,\n        \"experiment_code\"\
          : experiment_code,\n        \"experiment_type\": experiment_type,\n        \"category\": category,\n        \"step_id\"\
          : step_id,\n        \"step_title\": step_title,\n        \"step_desc\": step_desc,\n        \"data_json\": data_json,\n\
          \        \"retrieval_query_teaching\": retrieval_query_teaching,\n        \"retrieval_query_rules\": retrieval_query_rules,\n\
          \    }\n"
